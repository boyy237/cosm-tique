<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu utilisateur - Haut à droite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #e0eafc 0%, #cfdef3 100%);
            min-height: 100vh;
        }

        /* Barre supérieure + conteneur pour placer l'avatar à droite */
        .top-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 20px 30px;
            background: transparent;
        }

        /* Conteneur du menu relatif */
        .profile-container {
            position: relative;
            display: inline-block;
        }

        /* Avatar / icône utilisateur moderne */
        .avatar-btn {
            background: rgb(78, 117, 190);
            border: none;
            width: 56px;
            height: 56px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            transition: all 0.25s ease;
            backdrop-filter: blur(4px);
            background: rgba(31, 22, 22, 0.9);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .avatar-btn i {
            font-size: 28px;
            color: #cc730d;
            transition: transform 0.2s;
        }

        .avatar-btn:hover {
            transform: scale(1.05);
            background: white;
            box-shadow: 0 12px 24px rgba(0,0,0,0.15);
        }

        /* Menu déroulant (carte moderne) - ancré à droite */
        .dropdown-menu {
            position: absolute;
            top: 70px;
            right: 0;
            width: 340px;
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.3);
            padding: 1.2rem;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(255,255,255,0.4);
            z-index: 1000;
        }

        .dropdown-menu.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        /* Infos utilisateur */
        .user-info {
            border-bottom: 1px solid #eef2f6;
            padding-bottom: 1rem;
            margin-bottom: 1rem;
        }

        .user-name {
            font-size: 1.35rem;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: -0.2px;
        }

        .user-detail {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            color: #334155;
            margin-top: 8px;
        }

        .user-detail i {
            width: 20px;
            color: #3b82f6;
        }

        /* Section commandes */
        .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 600;
            color: #64748b;
            letter-spacing: 0.5px;
            margin: 1rem 0 0.6rem 0;
        }

        .orders-list {
            background: #f8fafc;
            border-radius: 18px;
            padding: 0.6rem 0.8rem;
            margin-bottom: 0.8rem;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            padding: 6px 0;
            color: #1e293b;
        }

        .order-id {
            font-weight: 500;
        }

        .order-status {
            color: #10b981;
            font-size: 0.7rem;
            background: #d1fae5;
            padding: 2px 8px;
            border-radius: 40px;
        }

        /* Lien menu */
        .menu-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 10px;
            border-radius: 16px;
            text-decoration: none;
            color: #1e293b;
            font-weight: 500;
            transition: background 0.2s;
            margin-top: 4px;
        }

        .menu-link i {
            width: 24px;
            font-size: 1.1rem;
        }

        .menu-link:hover {
            background: #f1f5f9;
        }

        .logout {
            color: #dc2626;
            border-top: 1px solid #eef2f6;
            margin-top: 12px;
            padding-top: 12px;
        }

        .logout:hover {
            background: #fef2f2;
        }

        .badge-light {
            font-size: 0.7rem;
            background: #e2e8f0;
            padding: 2px 8px;
            border-radius: 20px;
            color: #334155;
        }

        /* Petit formulaire d'inscription en bas à gauche */
        .inscription-card {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(255,255,255,0.95);
            border-radius: 28px;
            padding: 1.2rem;
            width: 300px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.5);
            z-index: 200;
        }

        .inscription-card h3 {
            font-size: 1rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .inscription-card input {
            width: 100%;
            margin-bottom: 8px;
            padding: 8px 12px;
            border-radius: 40px;
            border: 1px solid #cbd5e1;
            outline: none;
            transition: 0.2s;
        }

        .inscription-card input:focus {
            border-color: #3b82f6;
        }

        .inscription-card button {
            background: #0f172a;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 40px;
            width: 100%;
            cursor: pointer;
            font-weight: 500;
        }

        .inscription-card button:hover {
            background: #1e293b;
        }
    </style>
</head>
<body>

<!-- Barre du haut avec l'avatar à droite -->
<div class="top-bar">
    <div class="profile-container">
        <button class="avatar-btn" id="avatarBtn">
            <i class="fas fa-user-astronaut"></i>
        </button>

        <div class="dropdown-menu" id="dropdownMenu">
            <!-- Infos utilisateur -->
            <div class="user-info">
                <div class="user-name" id="displayName">Jean Dupont</div>
                <div class="user-detail"><i class="fas fa-map-marker-alt"></i> <span id="displayAddress">12 rue des Lilas, 75001 Paris</span></div>
                <div class="user-detail"><i class="fas fa-phone-alt"></i> <span id="displayPhone">+33 6 12 34 56 78</span></div>
                <div class="user-detail"><i class="fas fa-city"></i> <span id="displayCity">Paris</span></div>
            </div>

            <!-- Section commandes -->
            <div class="section-title"><i class="fas fa-box"></i> Mes commandes</div>
            <div class="orders-list" id="ordersContainer">
                <div class="order-item"><span class="order-id">#CMD-001</span><span class="order-status">Livrée</span></div>
                <div class="order-item"><span class="order-id">#CMD-002</span><span class="order-status">En cours</span></div>
            </div>

            <!-- Actions -->
            <a href="#" class="menu-link" id="myOrdersLink"><i class="fas fa-shopping-bag"></i> Toutes mes commandes</a>
            <a href="#" class="menu-link" id="profileSettings"><i class="fas fa-user-edit"></i> Modifier mon profil</a>
            <a href="#" class="menu-link logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Déconnexion</a>
            <div style="font-size: 0.7rem; text-align: center; margin-top: 12px; color: #94a3b8;">
                <i class="fas fa-shield-alt"></i> connecté
            </div>
        </div>
    </div>
</div>

<!-- Formulaire d'inscription / modification (en bas à gauche) -->
<div class="inscription-card">
    <h3>📝 Inscription / modifier profil</h3>
    <input type="text" id="inputName" placeholder="Nom complet" value="Jean Dupont">
    <input type="text" id="inputAddress" placeholder="Adresse" value="12 rue des Lilas, 75001 Paris">
    <input type="text" id="inputPhone" placeholder="Téléphone" value="+33 6 12 34 56 78">
    <input type="text" id="inputCity" placeholder="Ville" value="Paris">
    <button id="saveProfileBtn">Mettre à jour mon profil</button>
</div>

<script>
    // Gestion affichage menu
    const avatarBtn = document.getElementById('avatarBtn');
    const dropdown = document.getElementById('dropdownMenu');

    avatarBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        dropdown.classList.toggle('show');
    });

    document.addEventListener('click', (e) => {
        if (!avatarBtn.contains(e.target) && !dropdown.contains(e.target)) {
            dropdown.classList.remove('show');
        }
    });

    // Mise à jour de l'interface avec les données (localStorage)
    function updateProfileUI() {
        document.getElementById('displayName').innerText = localStorage.getItem('user_name') || 'Jean Dupont';
        document.getElementById('displayAddress').innerText = localStorage.getItem('user_address') || '12 rue des Lilas, 75001 Paris';
        document.getElementById('displayPhone').innerText = localStorage.getItem('user_phone') || '+33 6 12 34 56 78';
        document.getElementById('displayCity').innerText = localStorage.getItem('user_city') || 'Paris';

        // Exemple de commandes (peuvent venir du backend)
        const ordersData = [
            { id: "#CMD-001", status: "Livrée" },
            { id: "#CMD-002", status: "En cours" },
            { id: "#CMD-003", status: "Expédiée" }
        ];
        const ordersHtml = ordersData.map(order => `
            <div class="order-item">
                <span class="order-id">${order.id}</span>
                <span class="order-status">${order.status}</span>
            </div>
        `).join('');
        document.getElementById('ordersContainer').innerHTML = ordersHtml;
    }

    // Sauvegarde du profil (simule inscription)
    document.getElementById('saveProfileBtn').addEventListener('click', () => {
        const name = document.getElementById('inputName').value;
        const address = document.getElementById('inputAddress').value;
        const phone = document.getElementById('inputPhone').value;
        const city = document.getElementById('inputCity').value;

        localStorage.setItem('user_name', name);
        localStorage.setItem('user_address', address);
        localStorage.setItem('user_phone', phone);
        localStorage.setItem('user_city', city);

        updateProfileUI();
        alert('✅ Profil mis à jour (inscription réussie)');
    });

    // Déconnexion
    document.getElementById('logoutBtn').addEventListener('click', (e) => {
        e.preventDefault();
        if (confirm('Se déconnecter ?')) {
            localStorage.clear();
            localStorage.setItem('user_name', 'Invité');
            localStorage.setItem('user_address', 'Non renseignée');
            localStorage.setItem('user_phone', '---');
            localStorage.setItem('user_city', '---');
            updateProfileUI();
            alert('Déconnecté');
            dropdown.classList.remove('show');
        }
    });

    // Liens supplémentaires
    document.getElementById('profileSettings').addEventListener('click', (e) => {
        e.preventDefault();
        alert('🔧 Redirection vers modification du profil');
    });
    document.getElementById('myOrdersLink').addEventListener('click', (e) => {
        e.preventDefault();
        alert('📦 Affichage de toutes vos commandes');
    });

    // Initialisation
    updateProfileUI();
</script>
</body>
</html>
